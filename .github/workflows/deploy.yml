name: Deploy to AWS S3 + CloudFront

on:
  push:
    branches:
      - main       # triggers production deploy
      - uat        # triggers UAT deploy

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Deploy to S3 (Production)
        if: github.ref == 'refs/heads/main'
        run: |
          aws s3 sync . s3://${{ secrets.S3_BUCKET_PROD }} \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "*.md" \
            --exclude "sheet_content.csv" \
            --delete
          echo "✅ Production deploy complete"

      - name: Deploy to S3 (UAT)
        if: github.ref == 'refs/heads/uat'
        run: |
          aws s3 sync . s3://${{ secrets.S3_BUCKET_UAT }} \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "*.md" \
            --exclude "sheet_content.csv" \
            --delete
          echo "✅ UAT deploy complete"

      - name: Invalidate CloudFront cache (Production)
        if: github.ref == 'refs/heads/main'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DISTRIBUTION_PROD }} \
            --paths "/*"
          echo "✅ Production CDN cache cleared"

      - name: Invalidate CloudFront cache (UAT)
        if: github.ref == 'refs/heads/uat'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DISTRIBUTION_UAT }} \
            --paths "/*"
          echo "✅ UAT CDN cache cleared"
