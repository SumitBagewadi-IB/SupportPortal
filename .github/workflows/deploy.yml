name: Deploy to AWS S3 + CloudFront

on:
  push:
    branches:
      - main       # triggers production deploy
      - uat        # triggers UAT deploy

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (Production)
        if: github.ref == 'refs/heads/main'
        env:
          NEXT_PUBLIC_API_BASE: ${{ secrets.NEXT_PUBLIC_API_BASE }}
          NEXT_PUBLIC_ADMIN_SECRET: ${{ secrets.NEXT_PUBLIC_ADMIN_SECRET }}
          NEXT_PUBLIC_MASTER_ADMIN_PASSWORD: ${{ secrets.NEXT_PUBLIC_MASTER_ADMIN_PASSWORD }}
        run: npm run build

      - name: Build Next.js (UAT)
        if: github.ref == 'refs/heads/uat'
        env:
          NEXT_PUBLIC_API_BASE: ${{ secrets.NEXT_PUBLIC_API_BASE_UAT }}
          NEXT_PUBLIC_ADMIN_SECRET: ${{ secrets.NEXT_PUBLIC_ADMIN_SECRET }}
          NEXT_PUBLIC_MASTER_ADMIN_PASSWORD: ${{ secrets.NEXT_PUBLIC_MASTER_ADMIN_PASSWORD }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Deploy to S3 (Production)
        if: github.ref == 'refs/heads/main'
        run: |
          aws s3 sync out/ s3://${{ secrets.S3_BUCKET_PROD }} --delete
          echo "✅ Production deploy complete"

      - name: Deploy to S3 (UAT)
        if: github.ref == 'refs/heads/uat'
        run: |
          aws s3 sync out/ s3://${{ secrets.S3_BUCKET_UAT }} --delete
          echo "✅ UAT deploy complete"

      - name: Invalidate CloudFront cache (Production)
        if: github.ref == 'refs/heads/main'
        env:
          CF_DIST: ${{ secrets.CF_DISTRIBUTION_PROD }}
        run: |
          if [ -n "$CF_DIST" ]; then
            aws cloudfront create-invalidation --distribution-id "$CF_DIST" --paths "/*"
            echo "✅ Production CDN cache cleared"
          else
            echo "⏭️ No CF_DISTRIBUTION_PROD set, skipping"
          fi

      - name: Invalidate CloudFront cache (UAT)
        if: github.ref == 'refs/heads/uat'
        env:
          CF_DIST: ${{ secrets.CF_DISTRIBUTION_UAT }}
        run: |
          if [ -n "$CF_DIST" ]; then
            aws cloudfront create-invalidation --distribution-id "$CF_DIST" --paths "/*"
            echo "✅ UAT CDN cache cleared"
          else
            echo "⏭️ No CF_DISTRIBUTION_UAT set, skipping"
          fi

