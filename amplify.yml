version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - NEXT_PUBLIC_API_BASE=https://un1k0vx0ij.execute-api.ap-south-1.amazonaws.com/uat npm run build
    postBuild:
      commands:
        - zip -j /tmp/lambda-deploy.zip lambda/index.mjs
        - aws lambda update-function-code --function-name ib-faq-handler --zip-file fileb:///tmp/lambda-deploy.zip --region ap-south-1 --no-cli-pager || echo "Lambda deploy skipped (check IAM permissions)"
  artifacts:
    baseDirectory: out
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: X-Frame-Options
          value: DENY
        - key: X-Content-Type-Options
          value: nosniff
        - key: Referrer-Policy
          value: strict-origin-when-cross-origin
        - key: Permissions-Policy
          value: 'camera=(), microphone=(), geolocation=()'
        - key: Content-Security-Policy
          value: "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self' https://un1k0vx0ij.execute-api.ap-south-1.amazonaws.com; frame-ancestors 'none'"
        - key: Strict-Transport-Security
          value: max-age=31536000; includeSubDomains
