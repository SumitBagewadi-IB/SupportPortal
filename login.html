<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Indiabulls Securities</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="auth-logo">
            <img src="logo.svg" alt="Indiabulls Securities">
        </div>

        <div class="auth-card">
            <div class="auth-header">
                <h2>Login to Trade</h2>
            </div>

            <form id="login-form">
                <div class="login-form-field">
                    <label for="clientid">Client ID / User ID</label>
                    <input type="text" id="clientid" name="clientid" placeholder="Enter Client ID" required autofocus>
                </div>

                <div class="login-form-field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter Password" required>
                </div>

                <div style="display: flex; justify-content: flex-end; margin: -0.5rem 0 1.5rem;">
                    <a href="#"
                        style="font-size: 0.8125rem; color: var(--primary-blue); text-decoration: none; font-weight: 600;">Forgot
                        Password?</a>
                </div>

                <button type="submit" class="btn-auth">Proceed</button>
            </form>
        </div>

        <div class="auth-footer">
            Don't have an account? <a href="#">Open Account</a>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
