<!DOCTYPE html>
<html lang="en">

<head>
    <script>
        (function () {
            const theme = localStorage.getItem('theme') || 'light';
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Support Tickets | Indiabulls Securities Support</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <nav>
        <div class="container">
            <a href="index.html" class="logo">
                <img src="logo.svg" alt="Indiabulls Securities" class="logo-light">
                <img src="logo-dark.svg" alt="Indiabulls Securities" class="logo-dark">
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="faq.html">Knowledge Base</a></li>
                <li><a href="contact.html">Contact Us</a></li>
                <li><a href="my-tickets.html" class="active">My Tickets</a></li>
            </ul>
            <a href="login.html" class="btn-signin">Sign In</a>
            <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">
                <i class="fas fa-moon"></i>
                <i class="fas fa-sun"></i>
            </button>
        </div>
    </nav>

    <div class="page-wrap">
        <div class="container">
            <div
                style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 3rem; border-bottom: 1px solid var(--border); padding-bottom: 1.5rem;">
                <div>
                    <h1
                        style="font-size: 2.5rem; font-weight: 800; color: var(--text-dark); letter-spacing: -0.02em; margin-bottom: 0.5rem;">
                        My Support Requests</h1>
                    <p style="color: var(--text-muted); font-size: 1rem;">Track and manage your support conversations.
                    </p>
                </div>
                <a href="contact.html" class="btn-primary" style="padding: 0.75rem 1.25rem;">
                    <i class="fas fa-plus"></i> New Ticket
                </a>
            </div>

            <div class="stat-grid">
                <div class="stat-card">
                    <span class="label">Total Tickets</span>
                    <span class="value" id="stat-total">0</span>
                    <span class="trend neutral">Since account start</span>
                </div>
                <div class="stat-card">
                    <span class="label">Open Issues</span>
                    <span class="value" id="stat-open" style="color: #F59E0B;">0</span>
                    <span class="trend positive">Being handled</span>
                </div>
                <div class="stat-card">
                    <span class="label">Solved</span>
                    <span class="value" id="stat-solved" style="color: #10B981;">0</span>
                    <span class="trend positive">Success rate: 100%</span>
                </div>
            </div>

            <div id="tickets-container" style="display: grid; gap: 1rem;">
                <!-- Tickets will load here -->
            </div>
        </div>

        <!-- Ticket Detail Modal -->
        <div id="ticket-modal"
            style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
            <div
                style="background: white; width: 90%; max-width: 600px; border-radius: 12px; padding: 2rem; position: relative;">
                <button id="close-modal"
                    style="position: absolute; right: 1.5rem; top: 1.5rem; border: none; background: none; font-size: 1.5rem; cursor: pointer; color: var(--text-muted);">&times;</button>
                <div id="modal-content"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script src="tickets.js"></script>
</body>

</html>
