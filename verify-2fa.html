<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two-factor authentication | Indiabulls Securities Support</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <nav>
        <div class="container">
            <a href="index.html" class="logo">
                <img src="logo.svg" alt="Indiabulls Securities" class="logo-light">
                <img src="logo-dark.svg" alt="Indiabulls Securities" class="logo-dark">
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="faq.html">Knowledge Base</a></li>
                <li><a href="contact.html">Contact Us</a></li>
                <li><a href="my-tickets.html">My Tickets</a></li>
            </ul>
            <a href="login.html" class="btn-signin">Sign In</a>
            <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">
                <i class="fas fa-moon"></i>
                <i class="fas fa-sun"></i>
            </button>
        </div>
    </nav>

    <main class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <h2>Two-factor authentication</h2>
                    <p>Enter the code from your two-factor authentication app or browser extension below.</p>
                </div>

                <form id="2fa-form">
                    <div class="otp-input-wrapper">
                        <input type="text" id="otp-code" class="otp-field" placeholder="XXXXXX" maxlength="6"
                            pattern="\d{6}" inputmode="numeric" autocomplete="one-time-code" required autofocus>
                    </div>

                    <button type="submit" class="btn-primary">Verify</button>
                </form>

                <div class="auth-options">
                    <button type="button" class="options-btn">More options</button>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>

</html>
